<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#B5A596"/><stop offset="100%" stop-color="#706457"/></linearGradient>
    <linearGradient id="c2" x1="1" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C5BAAE"/><stop offset="100%" stop-color="#8A7A6A"/></linearGradient>
    <linearGradient id="c3" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#E7E5D0"/><stop offset="100%" stop-color="#9A9182"/></linearGradient>
    <linearGradient id="cGlow" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="#B8F030" stop-opacity="0.8"/><stop offset="100%" stop-color="#9BD301" stop-opacity="0.2"/></linearGradient>
    <linearGradient id="cDark" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#3D3528"/><stop offset="100%" stop-color="#5C5245"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#3D3528" flood-opacity="0.25"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <ellipse cx="200" cy="220" rx="120" ry="80" fill="url(#cGlow)" opacity="0.3" filter="url(#soft)"/>
  <circle cx="200" cy="190" r="110" fill="none" stroke="#E7E5D0" stroke-width="1.5" opacity="0.25"/>
  <circle cx="200" cy="190" r="100" fill="none" stroke="#B8F030" stroke-width="1" opacity="0.2" stroke-dasharray="8 12"/>
  <polygon points="200,320 120,220 200,260 280,220" fill="url(#cDark)" filter="url(#shadow)"/>
  <polygon points="200,90 120,220 200,260" fill="url(#c1)"/>
  <polygon points="200,90 280,220 200,260" fill="url(#c2)"/>
  <polygon points="200,90 120,220 200,160 280,220" fill="url(#c3)"/>
  <polyline points="200,90 200,260" stroke="#E7E5D0" stroke-width="1.5" opacity="0.5"/>
  <polyline points="200,90 120,220" stroke="#E7E5D0" stroke-width="1" opacity="0.3"/>
  <polyline points="200,90 280,220" stroke="#E7E5D0" stroke-width="1" opacity="0.3"/>
  <polygon points="200,90 125,218 120,220" fill="#C5BAAE" opacity="0.6"/>
  <polygon points="200,90 275,218 280,220" fill="#E7E5D0" opacity="0.3"/>
  <circle cx="200" cy="175" r="6" fill="#B8F030" filter="url(#glow)" opacity="0.9"/>
  <circle cx="200" cy="175" r="2.5" fill="#E7E5D0"/>
  <circle cx="140" cy="130" r="3" fill="#9BD301" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="260" cy="145" r="2.5" fill="#B8F030" opacity="0.5"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="170" cy="300" r="2" fill="#9BD301" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="240" cy="290" r="2.5" fill="#B8F030" opacity="0.5"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
</svg>
