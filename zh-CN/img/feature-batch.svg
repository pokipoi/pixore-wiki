<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1714"/>
      <stop offset="100%" stop-color="#0E0C08"/>
    </linearGradient>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#706457"/>
      <stop offset="100%" stop-color="#5C5245"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#857A6C"/>
      <stop offset="100%" stop-color="#706457"/>
    </linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9A9182"/>
      <stop offset="100%" stop-color="#857A6C"/>
    </linearGradient>
    <linearGradient id="c4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5C5245"/>
      <stop offset="100%" stop-color="#4E453A"/>
    </linearGradient>
    <linearGradient id="prog" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9BD301"/>
      <stop offset="100%" stop-color="#B8F030"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="16"/>

  <!-- ambient glow -->
  <ellipse cx="400" cy="250" rx="350" ry="200" fill="#9BD301" opacity="0.03"/>

  <!-- stacked cards group -->
  <g transform="translate(400,260)">
    <!-- back card -->
    <g filter="url(#sh)">
      <rect x="-170" y="-135" width="340" height="230" rx="14" fill="url(#c1)" transform="rotate(-6)"/>
    </g>
    <!-- middle card -->
    <g filter="url(#sh)">
      <rect x="-170" y="-135" width="340" height="230" rx="14" fill="url(#c2)" transform="rotate(-3)"/>
    </g>
    <!-- front card -->
    <g filter="url(#sh)">
      <rect x="-170" y="-135" width="340" height="230" rx="14" fill="url(#c3)"/>
    </g>
    <rect x="-170" y="-135" width="340" height="230" rx="14" fill="none" stroke="#C5BAAE" stroke-width="1" opacity="0.3"/>

    <!-- thumbnail -->
    <rect x="-140" y="-100" width="120" height="80" rx="8" fill="#3D3528" opacity="0.5"/>
    <rect x="-140" y="-100" width="120" height="80" rx="8" fill="none" stroke="#9A9182" stroke-width="1" opacity="0.4"/>
    <!-- play icon -->
    <circle cx="-80" cy="-60" r="16" fill="none" stroke="#9BD301" stroke-width="1.5" opacity="0.7"/>
    <polygon points="-76,-68 -76,-52 -64,-60" fill="#9BD301" opacity="0.7"/>

    <!-- text lines -->
    <rect x="-140" y="-5" width="280" height="6" rx="3" fill="#E7E5D0" opacity="0.5"/>
    <rect x="-140" y="12" width="200" height="5" rx="2.5" fill="#9A9182" opacity="0.4"/>
    <rect x="-140" y="24" width="160" height="5" rx="2.5" fill="#9A9182" opacity="0.3"/>

    <!-- progress bar bg -->
    <rect x="-140" y="48" width="280" height="6" rx="3" fill="#3D3528" opacity="0.8"/>
    <!-- progress bar fill -->
    <rect x="-140" y="48" width="210" height="6" rx="3" fill="url(#prog)" opacity="0.9"/>
    <text x="140" y="55" fill="#B8F030" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600" text-anchor="end" opacity="0.9">75%</text>
  </g>

  <!-- floating mini card left -->
  <g transform="translate(100,100)" opacity="0.7">
    <g filter="url(#sh)">
      <rect x="-40" y="-30" width="80" height="60" rx="8" fill="url(#c4)" transform="rotate(-8)"/>
    </g>
    <rect x="-40" y="-30" width="80" height="60" rx="8" fill="none" stroke="#C5BAAE" stroke-width="0.5" opacity="0.2" transform="rotate(-8)"/>
    <rect x="-30" y="-18" width="40" height="4" rx="2" fill="#E7E5D0" opacity="0.4" transform="rotate(-8)"/>
    <rect x="-30" y="-8" width="30" height="3" rx="1.5" fill="#9A9182" opacity="0.3" transform="rotate(-8)"/>
  </g>

  <!-- floating mini card right -->
  <g transform="translate(620,140)" opacity="0.5">
    <g filter="url(#sh)">
      <rect x="-35" y="-25" width="70" height="50" rx="7" fill="url(#c1)" transform="rotate(10)"/>
    </g>
    <rect x="-35" y="-25" width="70" height="50" rx="7" fill="none" stroke="#C5BAAE" stroke-width="0.5" opacity="0.2" transform="rotate(10)"/>
    <rect x="-25" y="-15" width="35" height="3" rx="1.5" fill="#E7E5D0" opacity="0.4" transform="rotate(10)"/>
    <rect x="-25" y="-7" width="25" height="3" rx="1.5" fill="#9A9182" opacity="0.3" transform="rotate(10)"/>
  </g>

  <!-- checkmark badge -->
  <g transform="translate(560,235)">
    <circle cx="0" cy="0" r="16" fill="#9BD301" opacity="0.15"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#9BD301" stroke-width="2"/>
    <polyline points="-5,0 -1,5 6,-4" stroke="#9BD301" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
  </g>

  <!-- batch count badge -->
  <g transform="translate(400,80)">
    <rect x="-60" y="-14" width="120" height="28" rx="14" fill="#3D3528" opacity="0.8" stroke="#9BD301" stroke-width="1" opacity="0.4"/>
    <text x="0" y="4" fill="#B8F030" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="700" text-anchor="middle">1,247 files</text>
  </g>
</svg>
