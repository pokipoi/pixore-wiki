name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write             # 需要写 gh-pages 分支

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm           # 缓存依赖，加速构建

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true   # 每次推送都无历史，gh-pages 永远只有一个提交
